name: PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_existing:
        description: "Publish the current pyproject.toml version without creating a new PSR release"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: pypi-release
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install test dependencies
        run: uv sync --frozen --group dev

      - name: Run tests
        run: uv run --frozen --group dev pytest -q

  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install build dependencies
        run: uv sync --frozen --group dev

      - name: Detect next semantic version
        id: next-version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish_existing }}" == "true" ]]; then
            CURRENT_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "existing=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "Publishing existing version: $CURRENT_VERSION"
            exit 0
          fi

          NEXT_OUTPUT="$(uv run --frozen --group dev semantic-release version --print)"
          NEXT_VERSION="$(printf '%s\n' "$NEXT_OUTPUT" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$' | tail -n 1 || true)"
          LAST_RELEASED="$(uv run --frozen --group dev semantic-release version --print-last-released)"

          if [[ -n "$NEXT_VERSION" && "$NEXT_VERSION" != "$LAST_RELEASED" ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "existing=false" >> "$GITHUB_OUTPUT"
            echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "Next release: $NEXT_VERSION"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "existing=false" >> "$GITHUB_OUTPUT"
            echo "No new semantic-release version detected; skipping PyPI publish."
            echo "$NEXT_OUTPUT"
          fi

      - name: Create semantic release
        if: steps.next-version.outputs.release == 'true' && steps.next-version.outputs.existing != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run --frozen --group dev semantic-release version --no-vcs-release

      - name: Build existing distribution
        if: steps.next-version.outputs.release == 'true' && steps.next-version.outputs.existing == 'true'
        run: uv build

      - name: Check distribution metadata
        if: steps.next-version.outputs.release == 'true'
        run: uv run --frozen --group dev twine check dist/*

      - name: Upload distribution artifact
        if: steps.next-version.outputs.release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

      - name: Publish package distributions to PyPI
        if: steps.next-version.outputs.release == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
