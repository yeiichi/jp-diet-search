name: PyPI

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pypi-release
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install test dependencies
        run: uv sync --frozen --group dev

      - name: Run tests
        run: uv run --frozen --group dev pytest -q

  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install build dependencies
        run: uv sync --frozen --group dev

      - name: Detect next semantic version
        id: next-version
        run: |
          NEXT_VERSION="$(uv run --frozen --group dev semantic-release version --print)"
          if [[ "$NEXT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "Next release: $NEXT_VERSION"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No semantic-release version detected; skipping PyPI publish."
          fi

      - name: Create semantic release
        if: steps.next-version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run --frozen --group dev semantic-release version --no-vcs-release

      - name: Check distribution metadata
        if: steps.next-version.outputs.release == 'true'
        run: uv run --frozen --group dev twine check dist/*

      - name: Upload distribution artifact
        if: steps.next-version.outputs.release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

      - name: Publish package distributions to PyPI
        if: steps.next-version.outputs.release == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
