name: Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - ".readthedocs.yaml"
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - ".readthedocs.yaml"
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Sphinx docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install documentation dependencies
        run: uv sync --frozen --extra docs

      - name: Build documentation
        run: uv run --frozen --extra docs sphinx-build -b html -W docs/source docs/build/html

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-html
          path: docs/build/html
          if-no-files-found: error

  trigger-rtd:
    name: Trigger Read the Docs
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Trigger RTD webhook
        env:
          RTD_WEBHOOK_URL: ${{ secrets.RTD_WEBHOOK_URL }}
          RTD_WEBHOOK_TOKEN: ${{ secrets.RTD_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$RTD_WEBHOOK_URL" ] || [ -z "$RTD_WEBHOOK_TOKEN" ]; then
            echo "RTD webhook secrets are not configured; skipping trigger."
            exit 0
          fi

          curl --fail --show-error --silent \
            --request POST \
            --data-urlencode "token=$RTD_WEBHOOK_TOKEN" \
            "$RTD_WEBHOOK_URL"
